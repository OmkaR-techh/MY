<!DOCTYPE html>
<html>
<head>
    <title>CSS Types Example</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>
        body {
            background-color: #f2f2f2;
        }

        h2 {
            color: darkblue;
            text-align: center;
        }

        table {
            border-collapse: collapse;
            width: 60%;
            margin: auto;
        }

        th {
            background-color: gray;
            color: white;
        }
    </style>
</head>

<body>

    <!-- Inline CSS -->
    <h1 style="color:red; text-align:center;">Student Information</h1>

    <h2>Details Table</h2>

    <table border="1">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>

        <tr>
            <td style="color:green;">John</td>
            <td>21</td>
            <td>New York</td>
        </tr>

        <tr>
            <td style="color:green;">Jane</td>
            <td>22</td>
            <td>London</td>
        </tr>
    </table>

</body>
</html>
