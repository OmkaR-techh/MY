
<!DOCTYPE html>
<html>
<head>
    <title>Web Page with Image, Link, and Nested Table</title>
</head>
<body>

    <h1 align="center">My Web Page</h1>

    <!-- Image -->
    <h2>My Image</h2>
    <img src="https://via.placeholder.com/200" alt="Sample Image" width="200">

    <!-- Hyperlink -->
    <h2>Visit Website</h2>
    <p>
        Click here to visit 
        <a href="https://www.google.com" target="_blank">Google</a>
    </p>

    <!-- Table with Nested Table -->
    <h2>Student Details</h2>
    <table border="1" cellpadding="10">
        <tr>
            <th>Name</th>
            <th>Details</th>
        </tr>

        <tr>
            <td>John</td>
            <td>
                <!-- Nested Table -->
                <table border="1">
                    <tr>
                        <th>Age</th>
                        <th>City</th>
                    </tr>
                    <tr>
                        <td>21</td>
                        <td>New York</td>
                    </tr>
                </table>
            </td>
        </tr>

        <tr>
            <td>Jane</td>
            <td>
                <!-- Nested Table -->
                <table border="1">
                    <tr>
                        <th>Age</th>
                        <th>City</th>
                    </tr>
                    <tr>
                        <td>22</td>
                        <td>London</td>
                    </tr>
                </table>
            </td>
        </tr>

    </table>

</body>
</html>
